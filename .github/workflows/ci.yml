name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  GO_VERSION: "1.23"
  GOLANGCI_LINT_VERSION: "v1.61"
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: "true"

jobs:
  # =========================================================================
  # Lint & Static Analysis
  # =========================================================================
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}
          working-directory: backend

      - name: go vet
        working-directory: backend
        run: go vet ./...

  # =========================================================================
  # Unit & Integration Tests
  # =========================================================================
  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: pcp
          POSTGRES_PASSWORD: pcp_secret
          POSTGRES_DB: pcp_test
        options: >-
          --health-cmd "pg_isready -U pcp -d pcp_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Download dependencies
        working-directory: backend
        run: go mod download

      - name: Run migrations
        run: |
          docker run --rm --network host \
            -v ${{ github.workspace }}/backend/migrations:/migrations \
            migrate/migrate:v4.17.0 \
            -path=/migrations \
            -database "postgres://pcp:pcp_secret@localhost:5432/pcp_test?sslmode=disable" \
            up

      - name: Run tests
        working-directory: backend
        env:
          PCP_DATABASE_HOST: localhost
          PCP_DATABASE_PORT: "5432"
          PCP_DATABASE_USER: pcp
          PCP_DATABASE_PASSWORD: pcp_secret
          PCP_DATABASE_NAME: pcp_test
          PCP_DATABASE_SSL_MODE: disable
        run: |
          go test -v -race -coverpkg=./internal/domain/...,./internal/application/...,./internal/infrastructure/auth,./internal/infrastructure/circuitbreaker,./internal/infrastructure/connector,./internal/infrastructure/config,./internal/infrastructure/logging,./internal/infrastructure/observability,./internal/interfaces/http/... -coverprofile=coverage.out ./... ./tests/integration/...
          go tool cover -func=coverage.out

      - name: Check coverage threshold
        working-directory: backend
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print substr($3, 1, length($3)-1)}')
          echo "Total coverage: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < 60" | bc -l) )); then
            echo "::error::Coverage ${COVERAGE}% is below 60% threshold"
            exit 1
          fi

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/coverage.out

  # =========================================================================
  # Build
  # =========================================================================
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build binary
        working-directory: backend
        run: |
          CGO_ENABLED=0 go build -ldflags="-w -s" -o bin/pcp-api ./cmd/api
          ls -la bin/

  # =========================================================================
  # Docker Build
  # =========================================================================
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        working-directory: backend
        run: docker build -t pcp-api:${{ github.sha }} .

      - name: Verify Docker image
        run: docker image inspect pcp-api:${{ github.sha }}

  # =========================================================================
  # Security Scan
  # =========================================================================
  security:
    name: Security
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "backend"
          format: "table"
          exit-code: "1"
          severity: "HIGH,CRITICAL"

      - name: Check for known vulnerabilities
        working-directory: backend
        run: go list -json -m all | docker run --rm -i sonatypecommunity/nancy:latest sleuth || true

  # =========================================================================
  # SBOM Generation
  # =========================================================================
  sbom:
    name: SBOM
    runs-on: ubuntu-latest
    needs: [docker]
    steps:
      - uses: actions/checkout@v4

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Generate SBOM
        run: syft pcp-api:${{ github.sha }} -o spdx-json > sbom.spdx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.spdx.json

  # =========================================================================
  # Image Signing (Cosign)
  # =========================================================================
  sign:
    name: Sign Image
    runs-on: ubuntu-latest
    needs: [docker, sbom]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign Docker image
        run: |
          echo "Image signing with keyless Cosign (requires OIDC)"
          # cosign sign --yes pcp-api:${{ github.sha }}
          echo "Signing configured - enable with registry push"

