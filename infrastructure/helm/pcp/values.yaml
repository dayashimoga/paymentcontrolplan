replicaCount: 3

image:
  repository: pcp-api
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  hosts:
    - host: api.pcp.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: pcp-tls
      hosts:
        - api.pcp.example.com

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

database:
  host: pcp-postgres
  port: 5432
  name: pcp
  user: pcp

redis:
  host: pcp-redis
  port: 6379

jwt:
  issuer: pcp
  expiration: 24h

log:
  level: info
  format: json

probes:
  liveness:
    path: /health
    initialDelaySeconds: 10
    periodSeconds: 30
  readiness:
    path: /ready
    initialDelaySeconds: 5
    periodSeconds: 10
