apiVersion: apps/v1
kind: Deployment
metadata:
  name: pcp-api
  namespace: pcp
  labels:
    app: pcp-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: pcp-api
  template:
    metadata:
      labels:
        app: pcp-api
    spec:
      containers:
        - name: pcp-api
          image: pcp-api:latest
          ports:
            - containerPort: 8080
          env:
            - name: PCP_SERVER_HOST
              value: "0.0.0.0"
            - name: PCP_SERVER_PORT
              value: "8080"
            - name: PCP_DATABASE_HOST
              valueFrom:
                configMapKeyRef:
                  name: pcp-config
                  key: database-host
            - name: PCP_DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: pcp-secrets
                  key: database-password
            - name: PCP_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: pcp-secrets
                  key: jwt-secret
            - name: PCP_LOG_LEVEL
              value: "info"
            - name: PCP_LOG_FORMAT
              value: "json"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: pcp-api
  namespace: pcp
spec:
  selector:
    app: pcp-api
  ports:
    - port: 80
      targetPort: 8080
  type: ClusterIP
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: pcp-config
  namespace: pcp
data:
  database-host: "pcp-postgres"
  database-port: "5432"
  database-name: "pcp"
  database-user: "pcp"
  redis-host: "pcp-redis"
  redis-port: "6379"
---
apiVersion: v1
kind: Namespace
metadata:
  name: pcp
  labels:
    app: pcp
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pcp-ingress
  namespace: pcp
  annotations:
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  rules:
    - host: api.pcp.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: pcp-api
                port:
                  number: 80
  tls:
    - hosts:
        - api.pcp.example.com
      secretName: pcp-tls
